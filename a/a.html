<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Log</title>
    <style>
        #logOutput {
            white-space: pre;
        }
    </style>
</head>
<body>
    <h1>Ver Log</h1>
    <div id="logOutput"></div>
    <script>
        function updateLog() {
            var logOutput = document.getElementById('logOutput');
            // Realiza uma requisição AJAX para obter o conteúdo atualizado do log
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'latest.log');
            xhr.onload = function() {
                if (xhr.status === 200) {
                    // Atualiza o conteúdo do log
                    logOutput.textContent = xhr.responseText;
                }
                // Agendamos a próxima atualização após 1 segundo
                setTimeout(updateLog, 500);
            };
            xhr.send();
        }

        // Inicia o processo de atualização do log
        updateLog();
    </script>
</body>
</html>
